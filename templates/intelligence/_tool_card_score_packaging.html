<div class="bg-white border border-stone-200 rounded-xl p-5 hover:border-stone-300 transition-colors">
    <div class="flex items-start justify-between mb-3">
        <div>
            <h3 class="text-sm font-semibold text-stone-900">Score packaging</h3>
            <p class="text-xs text-stone-500 mt-0.5">Title + thumbnail CTR prediction</p>
        </div>
        <span class="text-[10px] font-semibold uppercase tracking-wide px-2 py-0.5 rounded-full bg-stone-100 text-stone-600">1 credit</span>
    </div>

    <form hx-post="{% url 'intelligence:score-packaging' org_id=organization.id %}"
          hx-target="#score-packaging-result"
          hx-swap="outerHTML"
          class="space-y-2">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Video title"
               class="form-input w-full text-sm">
        <input type="url" name="thumbnail_url" placeholder="Thumbnail URL (optional)"
               class="form-input w-full text-sm">
        <button type="submit" class="btn-brand text-sm py-2 px-4 w-auto">Score</button>
    </form>
    <div id="score-packaging-result" class="mt-3"></div>
</div>
