<div>
    <div class="flex items-end justify-between gap-6">
        <div>
            <div class="text-xs uppercase tracking-wide text-stone-500">Overall hook score</div>
            <div class="mt-1 text-4xl font-bold text-stone-900 tabular-nums">{{ result.overall_score }}</div>
        </div>
        <div class="text-right">
            <div class="text-xs uppercase tracking-wide text-stone-500">Primary archetype</div>
            <div class="mt-1 text-sm font-semibold text-stone-900">{{ result.primary_archetype }}</div>
        </div>
    </div>

    {% if result.suggestions %}
    <div class="mt-5 pt-4 border-t border-stone-100">
        <div class="text-xs font-semibold uppercase tracking-wide text-stone-500 mb-2">Suggestions</div>
        <ul class="space-y-1.5 text-sm text-stone-700">
            {% for s in result.suggestions %}
            <li class="flex gap-2">
                <span class="text-stone-300 flex-shrink-0">•</span>
                <span>{{ s }}</span>
            </li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
</div>
