<div>
    <div class="flex items-end justify-between gap-6">
        <div>
            <div class="text-xs uppercase tracking-wide text-stone-500">Predicted CTR score</div>
            <div class="mt-1 text-4xl font-bold text-stone-900 tabular-nums">{{ result.score|floatformat:2 }}</div>
        </div>
        <div class="text-right">
            <div class="text-xs uppercase tracking-wide text-stone-500">Percentile</div>
            <div class="mt-1 text-2xl font-semibold tabular-nums" style="color: var(--primary);">{{ result.percentile }}</div>
        </div>
    </div>

    <div class="mt-5 pt-4 border-t border-stone-100">
        <div class="text-xs text-stone-500">Niche match</div>
        <div class="mt-1 flex items-center gap-2">
            <span class="text-sm font-medium text-stone-900">{{ result.niche_label }}</span>
            <span class="text-[11px] font-mono px-1.5 py-0.5 rounded bg-stone-100 text-stone-500">{{ result.niche_slug }}</span>
        </div>
    </div>
</div>
