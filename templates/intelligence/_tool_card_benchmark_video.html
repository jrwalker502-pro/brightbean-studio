<div class="bg-white border border-stone-200 rounded-xl p-5 hover:border-stone-300 transition-colors">
    <div class="flex items-start justify-between mb-3">
        <div>
            <h3 class="text-sm font-semibold text-stone-900">Benchmark video</h3>
            <p class="text-xs text-stone-500 mt-0.5">Video vs niche peers</p>
        </div>
        <span class="text-[10px] font-semibold uppercase tracking-wide px-2 py-0.5 rounded-full bg-stone-100 text-stone-600">3 credits</span>
    </div>

    <form hx-post="{% url 'intelligence:benchmark-video' org_id=organization.id %}"
          hx-target="#benchmark-video-result"
          hx-swap="outerHTML"
          class="space-y-2">
        {% csrf_token %}
        <input type="url" name="url" required placeholder="YouTube video URL"
               class="form-input w-full text-sm">
        <button type="submit" class="btn-brand text-sm py-2 px-4 w-auto">Benchmark</button>
    </form>
    <div id="benchmark-video-result" class="mt-3"></div>
</div>
