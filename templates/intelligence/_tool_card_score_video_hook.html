<div class="bg-white border border-stone-200 rounded-xl p-5 hover:border-stone-300 transition-colors">
    <div class="flex items-start justify-between mb-3">
        <div>
            <h3 class="text-sm font-semibold text-stone-900">Score video hook</h3>
            <p class="text-xs text-stone-500 mt-0.5">Analyze the first 6 seconds</p>
        </div>
        <span class="text-[10px] font-semibold uppercase tracking-wide px-2 py-0.5 rounded-full bg-stone-100 text-stone-600">10 credits</span>
    </div>

    <form hx-post="{% url 'intelligence:score-video-hook' org_id=organization.id %}"
          hx-target="#score-video-hook-result"
          hx-swap="outerHTML"
          class="space-y-2">
        {% csrf_token %}
        <input type="url" name="youtube_url" required placeholder="YouTube URL"
               class="form-input w-full text-sm">
        <button type="submit" class="btn-brand text-sm py-2 px-4 w-auto">Score</button>
    </form>
    <div id="score-video-hook-result" class="mt-3"></div>
</div>
