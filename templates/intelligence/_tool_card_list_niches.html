<div class="bg-white border border-stone-200 rounded-xl p-5 hover:border-stone-300 transition-colors">
    <div class="flex items-start justify-between mb-3">
        <div>
            <h3 class="text-sm font-semibold text-stone-900">List niches</h3>
            <p class="text-xs text-stone-500 mt-0.5">Available niche slugs</p>
        </div>
        <span class="text-[10px] font-semibold uppercase tracking-wide px-2 py-0.5 rounded-full bg-stone-100 text-stone-600">1 credit</span>
    </div>

    <form hx-post="{% url 'intelligence:list-niches' org_id=organization.id %}"
          hx-target="#list-niches-result"
          hx-swap="outerHTML">
        {% csrf_token %}
        <button type="submit" class="btn-brand text-sm py-2 px-4 w-auto">List niches</button>
    </form>
    <div id="list-niches-result" class="mt-3"></div>
</div>
